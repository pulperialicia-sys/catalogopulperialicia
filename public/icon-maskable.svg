<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable: content fits inside central 80% circle (r≈204) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#060d1f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full bleed background (no rounded corners for maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <ellipse cx="256" cy="240" rx="180" ry="150" fill="url(#glow)"/>

  <!-- Cart scaled down ~15% to respect safe zone -->
  <g transform="translate(256,256) scale(0.82) translate(-256,-256)">
    <line x1="86"  y1="162" x2="148" y2="162"
          stroke="#93c5fd" stroke-width="30" stroke-linecap="round"/>
    <line x1="148" y1="162" x2="188" y2="302"
          stroke="#93c5fd" stroke-width="30" stroke-linecap="round"/>
    <line x1="156" y1="210" x2="392" y2="210"
          stroke="#60a5fa" stroke-width="26" stroke-linecap="round"/>
    <line x1="188" y1="302" x2="378" y2="302"
          stroke="#60a5fa" stroke-width="26" stroke-linecap="round"/>
    <line x1="392" y1="210" x2="378" y2="302"
          stroke="#60a5fa" stroke-width="26" stroke-linecap="round"/>
    <circle cx="234" cy="354" r="30" fill="#60a5fa"/>
    <circle cx="346" cy="354" r="30" fill="#60a5fa"/>
  </g>
</svg>
