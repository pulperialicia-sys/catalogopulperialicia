<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#060d1f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Glow halo -->
  <ellipse cx="256" cy="230" rx="180" ry="150" fill="url(#glow)"/>

  <!-- Shopping cart — drawn manually at ~300×260 centered -->
  <!-- Handle: left stub -->
  <line x1="86" y1="162" x2="148" y2="162"
        stroke="#93c5fd" stroke-width="30" stroke-linecap="round"/>
  <!-- Handle to basket diagonal -->
  <line x1="148" y1="162" x2="188" y2="302"
        stroke="#93c5fd" stroke-width="30" stroke-linecap="round"/>

  <!-- Basket top rail -->
  <line x1="156" y1="210" x2="392" y2="210"
        stroke="#60a5fa" stroke-width="26" stroke-linecap="round"/>
  <!-- Basket bottom rail -->
  <line x1="188" y1="302" x2="378" y2="302"
        stroke="#60a5fa" stroke-width="26" stroke-linecap="round"/>
  <!-- Basket right wall -->
  <line x1="392" y1="210" x2="378" y2="302"
        stroke="#60a5fa" stroke-width="26" stroke-linecap="round"/>

  <!-- Wheels -->
  <circle cx="234" cy="354" r="30" fill="#60a5fa"/>
  <circle cx="346" cy="354" r="30" fill="#60a5fa"/>

  <!-- Star sparkle top-right -->
  <circle cx="400" cy="128" r="8" fill="#fbbf24" opacity="0.9"/>
  <circle cx="430" cy="108" r="5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="418" cy="150" r="4" fill="#93c5fd" opacity="0.7"/>
</svg>
